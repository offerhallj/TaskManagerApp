<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Task Manager App</title>
    <link rel="stylesheet" href="/docs/styles/styles.css">
</head>
<body>
    <main>
        <div class="login-page">
            <div class="floating-corner"><div></div></div>
            <div class="floating-corner secondary"><div></div></div>
            <div class="login-form-container">
                <div class="logo">
                    <img src="./icons/stacks-icon.svg" width="24">
                    <h1>Task Manager</h1>
                </div>
                <form id="login-form" class="content">
                    <fieldset>
                        <label for="username">Username</label>
                        <input type="text" id="username" required>
                        <label for="password">Password</label>
                        <input type="password" id="password" required>
                    </fieldset>
                    <button type="submit" class="action-button">Login</button>
                    <small>Don't have an account?</small>
                    <div class="action-button secondary-button" id="goto-create">
                        <a>Create an Account</a>
                    </div>
                </form>
                <form id="create-account-form" class="content hidden">
                    <fieldset>
                        <label for="username">Username</label>
                        <input type="text" id="username" required>
                        <label for="password">Password</label>
                        <input type="password" id="password" required>
                        <label for="email">Email</label>
                        <input type="email" id="email" required>
                    </fieldset>
                    <button type="submit" class="action-button">Create Account</button>
                    <small>Already have an account?</small>
                    <div class="action-button secondary-button" id="goto-login">
                        <a>Login</a>
                    </div>
                </form>
                <p id="login-error" class="hidden"></p>
            </div>
        </div>
    </main>
</body>
<script type="module" src="../dist/app.js"></script>
<script type="module" src="../dist/login/login.js"></script>
</html>
