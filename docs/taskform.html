<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks | Task Manager</title>
    <link rel="stylesheet" href="styles/styles.css">
</head>
<body>
    <form class="content task-form">
        <h2 id="task-form-title">New Task</h2>
        
        <input type="number" id="id" value="-1" class="hidden">
        <input type="text" id="user" class="hidden">
        <input type="text" id="createdate" class="hidden">
        <input type="text" id="status" class="hidden">
        <label for="title">Title</label>
        <input type="text" id="title" required>
        <label for="description">Description</label>
        <textarea id="description" required></textarea>
        <label for="duedate">Due Date</label>
        <input type="date" id="duedate" required>
        <label for="tags">Tags</label>
        <!-- <input type="text" id="tags" class="hidden"> -->
        <input type="text" id="tags">
        <label for="priority">Priority</label>
        <select id="priority" required>
            <option value="Low">Low</option>
            <option value="Medium">Medium</option>
            <option value="High">High</option>
        </select>
        <button type="submit">Save</button>
    </form>
    <div class="action-button">
        <select id="task-priority-setter">
            <option value="To Do">To Do</option>
            <option value="In Progress">In Progress</option>
            <option value="Complete">Complete</option>
        </select>
    </div>
</body>
<script type="module" src="../dist/tasks/task_form.js"></script>
<script type="module" src="../dist/app.js"></script>
</html>
