<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Task Manager App</title>
    <link rel="stylesheet" href="/static/styles/styles.css">
</head>
<body>
    <header>
        Task Manager App
        <nav>
            <a href="index.html">Home</a>
        </nav>
    </header>
    <main>
        <form id="login-form">
            <fieldset>
                <label for="username">Username</label>
                <input type="text" id="username" required>
                <label for="password">Password</label>
                <input type="password" id="password" required>
                <button type="submit">Login</button>
            </fieldset>
        </form>
        <form id="create-account-form" class="hidden">
            <fieldset>
                <label for="username">Username</label>
                <input type="text" id="username" required>
                <label for="password">Password</label>
                <input type="password" id="password" required>
                <label for="email">Email</label>
                <input type="email" id="email" required>
                <button type="submit">Create Account</button>
            </fieldset>
        </form>

        <p id="login-error" class="hidden"></p>
        <p id="create-account-prompt">Don't have an account? <a id="show-create-account">Create one here</a></p>
        <p id="login-prompt" class="hidden">Already have an account? <a id="show-login">Login here</a></p>
    </main>
</body>
<script type="module" src="../dist/app.js"></script>
<script type="module" src="../dist/login/login.js"></script>
</html>
