<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks | Task Manager</title>
    <link rel="stylesheet" href="/static/styles/styles.css">
</head>
<body>
    <header>
        Task Manager App
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="login.html" id="logout-button">Logout</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <form id="create-task" class="content">
            <label for="create-title">Title</label>
            <input type="text" id="create-title" required>
            <label for="create-description">Description</label>
            <textarea id="create-description" required></textarea>
            <label for="create-duedate">Due Date</label>
            <input type="date" id="create-duedate" required>
            <label for="create-priority">Priority</label>
            <select id="create-priority" required>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
            <button type="submit">Create</button>
        </form>

        <form id="edit-task" class="content">
            <input type="number" id="edit-id" hidden value="-1">
            <label for="edit-title">Title</label>
            <input type="text" id="edit-title" required>
            <label for="edit-description">Description</label>
            <textarea id="edit-description" required></textarea>
            <label for="edit-duedate">Due Date</label>
            <input type="date" id="edit-duedate" required>
            <label for="edit-priority">Priority</label>
            <select id="edit-priority" required>
                <option value="low">Low</option>
                <option value="medium">Medium</option>
                <option value="high">High</option>
            </select>
            <button type="submit">Save</button>
        </form>

        <table>
            <caption>Tasks</caption>
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Description</th>
                    <th>Due Date</th>
                    <th>Priority</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="task-table-body">

            </tbody>
        </table>
    </main>
</body>
<script type="module" src="../dist/login/validateLogin.js"></script>
<script type="module" src="../dist/tasks/tasks.js"></script>
<script type="module" src="../dist/app.js"></script>
</html>
