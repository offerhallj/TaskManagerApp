<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks | Task Manager</title>
    <link rel="stylesheet" href="/static/styles/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
</head>
<body>
    <main>
        <div class="sidebar">
            <div class="logo">
                <img src="./icons/stacks-icon.svg" width="24">
                <h1>Task Manager</h1>
            </div>
            <small>Views</small>
            <nav>
                <ul class="views-nav" id="views-nav">
                    <li><a href="index.html">Dashboard</a></li>
                    <li><a href="index.html">Homework</a></li>
                    <li><a href="index.html">Due Today</a></li>
                </ul>
                <a href="login.html" id="logout-button">Logout</a>
            </nav>
        </div>    
        <div class="task-view">
            <div class="floating-corner"><div></div></div>
            <div class="view-title-container">
                <div class="view-button-container">
                    <img src="./icons/bookmark-check.svg" class="icon-button inactive" width="24" id="save-view" title="Save this View">
                    <img src="./icons/bookmark-add.svg" class="icon-button" width="24" id="new-view" title="Create a new View"> 
                    <img src="./icons/edit-square.svg" class="icon-button" width="24" id="edit-view" title="Edit this View">
                    <img src="./icons/delete.svg" class="icon-button" width="24"  id="delete-view" title="Delete this View">
                    <p id="view-action">Test</p>
                </div>
                <h2 id="view-title">Dashboard</h2>
            </div>
            
            <form id="search-form">
                <img src="/static/icons/search.svg">
                <input type="text" id="search-bar" placeholder="Search in Title">
                <div class="filter-option-container">
                    <!-- <label for="search-options">Filter by:</label> -->
                    <select id="search-options"></select>
                </div>
            </form>
            
            <input type="text" id="view-name">
            <select id="sort-options">
                <option>H</option>
                <option>E</option>
            </select>
            <div id="priority-filter-container"></div>
            <div id="status-filter-container"></div>

            <a href="/static/taskform.html" id="new-task">Create a New Task</a>
            <div>
                <button id="compact-view">Compact View</button>
                <button id="basic-view">Basic View</button>
                <button id="detailed-view">Detailed View</button>
            </div>
            <div id="task-container">
            </div>
        </div>
    </main>
</body>
<script type="module" src="../dist/login/validateLogin.js"></script>
<script type="module" src="../dist/views/views.js"></script>
<script type="module" src="../dist/tasks/tasks.js"></script>
<script type="module" src="../dist/app.js"></script>
</html>
