<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks | Task Manager</title>
    <link rel="stylesheet" href="/static/styles/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
</head>
<body>
    <main>
        <div class="sidebar">
            <div class="logo">
                <img src="./icons/stacks-icon.svg" width="24">
                <h1>Task Manager</h1>
            </div>
            <small>Views</small>
            <nav>
                <ul class="views-nav" id="views-nav">
                    <li><a href="index.html">Dashboard</a></li>
                    <li><a href="index.html">Homework</a></li>
                    <li><a href="index.html">Due Today</a></li>
                </ul>
                <a href="login.html" id="logout-button">Logout</a>
            </nav>
        </div>    
        <div class="task-view">
            <div class="floating-corner"><div></div></div>
            <div class="flex space-between">
                <div class="view-title-container">
                    <div class="view-button-container">
                        <img src="./icons/bookmark-check.svg" class="icon-button inactive" width="24" id="save-view" title="Save this View">
                        <!-- <img src="./icons/bookmark-add.svg" class="icon-button" width="24" id="new-view" title="Create a new View">  -->
                        <img src="./icons/edit-square.svg" class="icon-button" width="24" id="edit-view" title="Edit this View">
                        <img src="./icons/delete.svg" class="icon-button" width="24"  id="delete-view" title="Delete this View">
                        <p id="view-action">Test</p>
                    </div>
                    <h2 id="view-title">Dashboard</h2>
                </div>
                <div class="filter-options-container">
                    <div class="filter-options-field">
                        <div id="priority-filter-container" class="filter-options"></div>
                        <small>Priority</small>
                    </div>
                    <div class="filter-options-field">
                        <div id="status-filter-container" class="filter-options"></div>
                        <small>Status</small>
                    </div>
                </div>
            </div>
            
            <form id="search-form">
                <img src="/static/icons/search.svg">
                <input type="text" id="search-bar" placeholder="Search in Title">
                <div class="option-container">
                    <label for="search-options">Filter by:</label>
                    <select id="search-options"></select>
                </div>
            </form>
  
            <div class="flex space-between">
                <div class="flex task-header">
                    <h2>Tasklist</h2>
                    <div class="icon-button flex" id="new-task">
                        <img src="./icons/add.svg">
                        <a>Create a New Task</a>
                    </div>
                </div>
    
                <div class="view-options">
                    <div class="display-type-buttons">
                        <img class="icon-button" src="./icons/compact.svg" width="20" id="compact-view">
                        <img class="icon-button" src="./icons/basic.svg" width="20" id="basic-view">
                        <img class="icon-button" src="./icons/detailed.svg" width="20" id="detailed-view">
                    </div>
                    <img src="./icons/sort.svg" class="sort-icon" width="24">
                    <div class="option-container sort-options-container">
                        <label for="sort-options">Sort by</label>
                        <select id="sort-options">
                        </select>
                    </div>
                </div>
            </div>

            
            <div id="task-container">
            </div>
            <input type="text" id="view-name">
        </div>

        <div class="hidden" id="form-window-container">
            <form class="task-form">
                <h2 id="task-form-title">New Task</h2>
                <input type="number" id="id" value="-1" class="hidden">
                <input type="text" id="user" class="hidden">
                <input type="text" id="createdate" class="hidden">
                <input type="text" id="status" class="hidden">
                <label for="title">Title</label>
                <input type="text" id="title" required>
                <label for="description">Description</label>
                <textarea id="description" required></textarea>
                <label for="duedate">Due Date</label>
                <input type="date" id="duedate" required>
                <label for="tags">Tags</label>
                <!-- <input type="text" id="tags" class="hidden"> -->
                <input type="text" id="tags">
                <label for="priority">Priority</label>
                <select id="priority" required>
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                </select>
                <button type="submit">Save</button>
            </form>
        </div>
    </main>
</body>
<script type="module" src="../dist/login/validateLogin.js"></script>
<script type="module" src="../dist/views/views.js"></script>
<script type="module" src="../dist/tasks/tasks.js"></script>
<script type="module" src="../dist/tasks/task_form.js"></script>
<script type="module" src="../dist/app.js"></script>
</html>
